<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice 4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <form>
        <label for="">Username</label>
            <br>
            <input type="text" id="uname" class="form-control" placeholder="Enter here" required>
            <br>
            <label for="">password</label>
            <br>
            <input type="password" id="pwd" class="form-control" placeholder="Enter here" required>
            <br>

        <input type="button" name="button" id="loginBTN" value="Login" class="btn btn-info rounded-5" onclick="authenticate()">
        <input type="reset" name="reset" id="cancel" value="cancel" class="btn btn-info rounded-5">
    </form>

    <script>
        let attempt_counter = 0
        function authenticate(){
            let username = document.getElementById("uname").value;
            let pwd = document.getElementById("pwd").value;
            let granted = "Welcome " + username + "!";
            let denied = "Access denied. Account locked after 3 attempts!";

            while (attempt_counter < 3) {
            if (username === "Greenalienlover_18" && pwd === "girgirgir") {
                alert(granted);
                attempt_counter = 0; // reset attempts after successful login
                document.getElementById("display").innerHTML = "";
                window.location.href = "dashboard.html";

                break; // stop loop
            } 

            else {
            attempt_counter++;
            document.getElementById("display").innerHTML =
                "Incorrect username and/or password. Attempt " + attempt_counter + " of 3 ";
            break; // stop loop for this click
        }
    }

    if (attempt_counter >= 3) {
        alert(denied);
        document.getElementById("loginBTN").disabled = true; // disable button
    }
} 
    </script>
</body>
</html>
